{% extends "layout.html" %}

{% block body %}
<div class="-mx-6 md:-mx-16 lg:-mx-24 xl:-mx-32 -my-8 h-[calc(100vh-70px)] overflow-hidden flex items-center justify-center px-4">
    <form class="bg-white text-gray-500 w-full max-w-sm p-5 sm:p-6 text-left text-sm rounded-xl shadow-[0px_0px_10px_0px] shadow-black/10">
        <h2 class="text-2xl font-semibold my-4 text-center text-gray-800">Login</h2>

        <input id="email" 
            class="w-full border my-3 border-gray-500/30 outline-none rounded-full py-2.5 px-4" 
            type="email" placeholder="Enter your email" required>

        <input id="password" 
            class="w-full border my-3 border-gray-500/30 outline-none rounded-full py-2.5 px-4" 
            type="password" placeholder="Enter your password" required>

        <button type="submit" 
            class="w-full my-3 bg-indigo-500 hover:bg-indigo-600/90 active:scale-95 transition py-2.5 rounded-full text-white">
            Log in
        </button>

        <p class="text-center y-4">
            Don’t have an account? 
            <a href="{{ url_for('signup') }}" class="text-blue-500 underline">Signup Now</a>
        </p>
    </form>
</div>

{% endblock %}
