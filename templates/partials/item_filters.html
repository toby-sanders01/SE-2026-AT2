<section class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm">
    <form method="get" action="{{ url_for(request.endpoint) }}" class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
        <div class="md:col-span-7">
            <label for="item-search" class="block text-sm font-medium text-gray-700 mb-1">Search items</label>
            <input
                id="item-search"
                name="q"
                type="text"
                value="{{ search_query or '' }}"
                placeholder="Search by title, tag, or description"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500"
            >
        </div>
        <div class="md:col-span-3">
            <label for="stock-filter" class="block text-sm font-medium text-gray-700 mb-1">Stock filter</label>
            <select
                id="stock-filter"
                name="stock"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 bg-white"
            >
                <option value="all" {% if selected_stock_filter == 'all' %}selected{% endif %}>All</option>
                <option value="in-stock" {% if selected_stock_filter == 'in-stock' %}selected{% endif %}>In Stock</option>
                <option value="low-stock" {% if selected_stock_filter == 'low-stock' %}selected{% endif %}>Low Stock</option>
                <option value="out-of-stock" {% if selected_stock_filter == 'out-of-stock' %}selected{% endif %}>Out of Stock</option>
            </select>
        </div>
        <div class="md:col-span-2 flex gap-2">
            <button
                type="submit"
                class="w-full inline-flex items-center justify-center rounded-full bg-indigo-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-indigo-600/90 transition-colors"
            >
                Apply
            </button>
            <a
                href="{{ url_for(request.endpoint) }}"
                class="inline-flex items-center justify-center rounded-full border border-gray-300 px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
            >
                Reset
            </a>
        </div>
    </form>
</section>
