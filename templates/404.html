{% extends "layout.html" %}

{% block body %}
<section class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-xl rounded-2xl border border-gray-200 bg-white p-8 text-center shadow-sm">
        <p class="text-sm font-semibold uppercase tracking-wide text-gray-500">Error 404</p>
        <h1 class="mt-2 text-3xl font-semibold text-gray-900">Page not found</h1>
        <p class="mt-3 text-sm text-gray-600">
            The page you requested does not exist or may have moved.
        </p>
        <div class="mt-6 flex flex-wrap items-center justify-center gap-3">
            <a
                href="{{ url_for(primary_endpoint) }}"
                class="inline-flex h-11 items-center justify-center rounded-full bg-slate-600 px-5 text-sm font-medium text-white transition-colors hover:bg-slate-700"
            >
                {{ primary_label }}
            </a>
            <a
                href="{{ url_for('index') }}"
                class="inline-flex h-11 items-center justify-center rounded-full border border-gray-300 px-5 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50"
            >
                Back to Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
