<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <title>inventryx.</title>
</head>
<body class="min-h-screen flex flex-col bg-gray-50">
    <nav class="h-[70px] w-full px-6 md:px-16 lg:px-24 xl:px-32 flex items-center justify-between z-20 bg-white text-gray-700 shadow-[0px_10px_25px_0px_#0000000D] transition-all">
        
        {% if not logged_in %}
        <a href="{{ url_for('index') }}">
            <img src="{{ url_for('static', filename='big-logo.png') }}" width="150" alt="inventryx logo">
        </a>
        {% else %}
            <img src="{{ url_for('static', filename='big-logo.png') }}" width="150" alt="inventryx logo">
        {% endif %}

        {% if logged_in %}
            Hello, {{ current_user_name }}
        {% else %}
        <a href="{{ url_for('login') }}"
           class="bg-white text-gray-600 border border-gray-300 text-sm hover:bg-gray-50 active:scale-95 transition-all w-40 h-11 rounded-full inline-flex items-center justify-center">
            Login
        </a>
        {% endif %}
    </nav>

    <div class="wrapper px-6 md:px-16 lg:px-24 xl:px-32 py-8 flex-1">
        {% block body %}{% endblock %}
    </div>

    {% if show_footer %}
    <footer class="w-full bg-white text-gray-700 shadow-[0px_-10px_25px_0px_#0000000D]">
        <div class="px-6 md:px-16 lg:px-24 xl:px-32 py-8 flex flex-col items-center">
            <img src="{{ url_for('static', filename='big-logo.png') }}" width="150" alt="inventryx logo">

            {% if logged_in %}
            <a href="{{ url_for('logout') }}"
               class="mt-4 text-xs px-3 py-1 rounded-full border border-gray-300 hover:bg-gray-50 transition-all">
                Log out
            </a>
            {% endif %}

            <p class="mt-4 text-center text-sm">
                Copyright © 2026
                <a href="{{ url_for('index') }}" class="hover:underline">inventryx</a>. All rights reserved.
            </p>
        </div>
    </footer>
    {% endif %}
</body>
</html>
