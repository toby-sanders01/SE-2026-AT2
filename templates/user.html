{% extends "layout.html" %}

{% block body %}
<div class="space-y-6">
    <section id="welcome-section" class="max-w-3xl mx-auto">
        <div id="welcome-card" class="bg-white rounded-2xl p-8 shadow-[0px_0px_12px_0px] shadow-black/10 transition-opacity duration-500">
            <h1 class="text-xl font-semibold text-gray-800 text-center">Welcome, {{ user_name }}.</h1>
        </div>
    </section>

    <section class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
        <article class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
            <div class="flex items-start gap-4">
                <img
                    src="{{ url_for('static', filename='small-logo.png') }}"
                    alt="Item image"
                    class="h-20 w-20 rounded-xl object-cover bg-gray-100 p-2"
                >

                <div class="flex-1 space-y-2">
                    <h3 class="text-lg font-semibold text-gray-900">Bearing</h3>
                    <p class="text-sm font-medium text-gray-500">121212</p>
                    <div class="inline-flex items-center rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">
                        In Stock
                    </div>
                    <p class="text-base font-semibold text-gray-900">Items Remaining: 67</p>
                    <button
                        type="button"
                        data-modal-open
                        class="mt-2 inline-flex items-center rounded-full border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
                    >
                        More info
                    </button>
                </div>
            </div>
        </article>

    </section>
</div>

<div
    id="item-modal-overlay"
    class="fixed inset-0 z-40 hidden items-center justify-center bg-black/25 backdrop-blur-sm p-4"
    aria-hidden="true"
>
    <div
        role="dialog"
        aria-modal="true"
        aria-labelledby="item-modal-title"
        class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-2xl"
    >
        <div class="flex items-start justify-between gap-4">
            <h2 id="item-modal-title" class="text-xl font-semibold text-gray-900">Item Details</h2>
            <button
                type="button"
                data-modal-close
                class="rounded-full border border-gray-300 px-3 py-1 text-sm text-gray-700 hover:bg-gray-50"
            >
                Close
            </button>
        </div>

        <div class="mt-4 flex flex-col sm:flex-row items-start gap-6 text-sm text-gray-700">
            <img
                src="{{ url_for('static', filename='small-logo.png') }}"
                alt="Item image"
                class="h-40 w-40 rounded-xl object-cover bg-gray-100 p-2 shrink-0"
            >
            <div class="space-y-3">
                <p><span class="font-semibold text-gray-900">Tag:</span> SKU-001</p>
                <p><span class="font-semibold text-gray-900">Status:</span> In Stock</p>
                <p><span class="font-semibold text-gray-900">Items Remaining:</span> 42</p>
                <p><span class="font-semibold text-gray-900">Description:</span> In-depth item details can be shown here from your database.</p>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const welcomeSection = document.getElementById("welcome-section");
        const welcomeCard = document.getElementById("welcome-card");
        const modalOverlay = document.getElementById("item-modal-overlay");
        const modalOpenButtons = document.querySelectorAll("[data-modal-open]");
        const modalCloseButtons = document.querySelectorAll("[data-modal-close]");

        const openModal = () => {
            if (!modalOverlay) return;
            modalOverlay.classList.remove("hidden");
            modalOverlay.classList.add("flex");
            modalOverlay.setAttribute("aria-hidden", "false");
        };

        const closeModal = () => {
            if (!modalOverlay) return;
            modalOverlay.classList.add("hidden");
            modalOverlay.classList.remove("flex");
            modalOverlay.setAttribute("aria-hidden", "true");
        };

        modalOpenButtons.forEach((button) => {
            button.addEventListener("click", openModal);
        });

        modalCloseButtons.forEach((button) => {
            button.addEventListener("click", closeModal);
        });

        if (modalOverlay) {
            modalOverlay.addEventListener("click", (event) => {
                if (event.target === modalOverlay) closeModal();
            });
        }

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") closeModal();
        });

        if (!welcomeSection || !welcomeCard) return;

        setTimeout(() => {
            welcomeCard.classList.add("opacity-0");
            setTimeout(() => {
                welcomeSection.remove();
            }, 500);
        }, 3000);
    });
</script>

{% endblock %}
